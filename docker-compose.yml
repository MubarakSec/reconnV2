version: '3.8'

# ╔═══════════════════════════════════════════════════════════╗
# ║              ReconnV2 Docker Compose                      ║
# ╚═══════════════════════════════════════════════════════════╝

services:
  recon:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reconnv2
    volumes:
      # Persist jobs and results
      - ./jobs:/app/jobs
      - ./config:/app/config
      - ./archive:/app/archive
      # For custom wordlists
      - ./wordlists:/app/wordlists:ro
    environment:
      - RECON_HOME=/app
      - RECON_LOG_LEVEL=INFO
    network_mode: host  # For network scanning
    stdin_open: true
    tty: true
    
  # Optional: Web UI (future feature)
  # web:
  #   build:
  #     context: ./web
  #   ports:
  #     - "8080:8080"
  #   depends_on:
  #     - recon
  #   volumes:
  #     - ./jobs:/app/jobs:ro

# Volumes for persistence
volumes:
  jobs:
  config:
  archive:
