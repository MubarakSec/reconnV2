version: '3'
services:
  juiceshop:
    image: bkimminich/juice-shop:latest
    ports:
      - "3000:3000"
    restart: always

  dvwa:
    image: vulnerables/web-dvwa:latest
    ports:
      - "8001:80"
    restart: always

  webgoat:
    image: webgoat/webgoat:latest
    ports:
      - "8081:8080"
    restart: always
