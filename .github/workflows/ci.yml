name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ============================================
  # Lint and Code Quality
  # ============================================
  lint:
    name: 🔍 Lint & Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy
          pip install -e ".[dev,api]"
      
      - name: 🔍 Run Ruff (linting)
        run: |
          ruff check recon_cli/ --output-format=github
      
      - name: 🔍 Run Ruff (formatting)
        run: |
          ruff format --check recon_cli/
      
      - name: 📝 Run MyPy (type checking)
        run: |
          mypy recon_cli/ --ignore-missing-imports

  # ============================================
  # Unit Tests
  # ============================================
  test:
    name: 🧪 Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🐍 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,api]"
      
      - name: 🧪 Run tests with coverage
        run: |
          pytest tests/ -v --cov=recon_cli --cov-report=xml --cov-report=term-missing
      
      - name: 📊 Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ============================================
  # Security Scan
  # ============================================
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit
          pip install -e .
      
      - name: 🔒 Run Bandit (security linter)
        run: |
          bandit -r recon_cli/ -ll
      
      - name: 🔒 Run Pip-Audit (dependency check)
        run: |
          pip-audit

  # ============================================
  # Build Package
  # ============================================
  build:
    name: 📦 Build Package
    runs-on: ubuntu-latest
    needs: [lint, test]
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: 📦 Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build wheel
      
      - name: 🔨 Build package
        run: |
          python -m build
      
      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ============================================
  # Integration Tests
  # ============================================
  integration:
    name: 🔗 Integration Tests
    runs-on: ubuntu-latest
    needs: [build]
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: 📥 Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      
      - name: 📦 Install from wheel
        run: |
          python -m pip install --upgrade pip
          pip install dist/*.whl
          pip install pytest playwright aiohttp  # Install test dependencies not in wheel
      
      - name: 🔗 Run integration tests
        run: |
          pytest tests/integration/ -v
      
      - name: 🧪 Test CLI commands
        run: |
          recon-cli --help
          recon-cli doctor
          recon-cli telegram-bot --help

  # ============================================
  # Documentation
  # ============================================
  docs:
    name: 📚 Build Documentation
    runs-on: ubuntu-latest
    needs: [lint]
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs mkdocs-material mkdocstrings[python]
          pip install -e .
      
      - name: 📚 Build docs
        run: |
          if [ -f mkdocs.yml ]; then
            mkdocs build
          else
            echo "No mkdocs.yml found, skipping docs build"
          fi

  # ============================================
  # Release (on tag)
  # ============================================
  release:
    name: 🚀 Create Release
    runs-on: ubuntu-latest
    needs: [build, test, security]
    if: startsWith(github.ref, 'refs/tags/v')
    
    permissions:
      contents: write
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 📥 Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      
      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
