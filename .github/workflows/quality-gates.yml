name: Quality Gates

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  regression-suite:
    name: Regression Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,api]"

      - name: Run quality regression tests
        run: |
          pytest -v \
            tests/test_results_merge.py \
            tests/test_reporting_normalization.py \
            tests/test_cli_regressions.py \
            tests/test_reporter.py
