<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الإعدادات - ReconnV2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #6366f1;
            --secondary-color: #8b5cf6;
            --success-color: #22c55e;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
        }
        
        body {
            background: var(--dark-bg);
            color: var(--text-primary);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }
        
        .navbar {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)) !important;
        }
        
        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
        }
        
        .form-control, .form-select {
            background: var(--dark-bg);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-primary);
        }
        
        .form-control:focus, .form-select:focus {
            background: var(--dark-bg);
            border-color: var(--primary-color);
            color: var(--text-primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }
        
        .form-check-input:checked {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border: none;
        }
        
        .notification-card {
            border: 2px solid transparent;
            transition: all 0.3s;
        }
        
        .notification-card.enabled {
            border-color: var(--success-color);
        }
        
        .notification-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        
        .telegram-icon { color: #0088cc; }
        .slack-icon { color: #4A154B; }
        .discord-icon { color: #5865F2; }
        .email-icon { color: #EA4335; }
        
        .nav-pills .nav-link {
            color: var(--text-secondary);
        }
        
        .nav-pills .nav-link.active {
            background: var(--primary-color);
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">
                <i class="bi bi-shield-check me-2"></i>
                ReconnV2 Dashboard
            </a>
            <div class="navbar-nav me-auto">
                <a class="nav-link" href="/"><i class="bi bi-house me-1"></i> الرئيسية</a>
                <a class="nav-link" href="/jobs"><i class="bi bi-list-task me-1"></i> المهام</a>
                <a class="nav-link" href="/scan"><i class="bi bi-search me-1"></i> فحص جديد</a>
                <a class="nav-link active" href="/settings"><i class="bi bi-gear me-1"></i> الإعدادات</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <h2 class="mb-4"><i class="bi bi-gear me-2"></i>الإعدادات</h2>
        
        <!-- Settings Tabs -->
        <ul class="nav nav-pills mb-4" id="settingsTabs">
            <li class="nav-item">
                <a class="nav-link active" data-bs-toggle="pill" href="#notifications">
                    <i class="bi bi-bell me-1"></i> الإشعارات
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" data-bs-toggle="pill" href="#profiles">
                    <i class="bi bi-collection me-1"></i> الملفات الشخصية
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" data-bs-toggle="pill" href="#general">
                    <i class="bi bi-sliders me-1"></i> عام
                </a>
            </li>
        </ul>
        
        <div class="tab-content">
            <!-- Notifications Tab -->
            <div class="tab-pane fade show active" id="notifications">
                <div class="row g-4">
                    <!-- Telegram -->
                    <div class="col-md-6">
                        <div class="card notification-card p-4" id="telegram-card">
                            <div class="text-center">
                                <i class="bi bi-telegram notification-icon telegram-icon"></i>
                                <h5>Telegram</h5>
                            </div>
                            <div class="form-check form-switch mb-3">
                                <input class="form-check-input" type="checkbox" id="telegram-enabled" onchange="toggleCard('telegram')">
                                <label class="form-check-label" for="telegram-enabled">تفعيل</label>
                            </div>
                            <div class="telegram-fields" style="display: none;">
                                <div class="mb-3">
                                    <label class="form-label">Bot Token</label>
                                    <input type="text" class="form-control" id="telegram-token" placeholder="123456:ABC-DEF...">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Chat ID</label>
                                    <input type="text" class="form-control" id="telegram-chat" placeholder="-100123456789">
                                </div>
                                <button class="btn btn-outline-primary btn-sm" onclick="testNotification('telegram')">
                                    <i class="bi bi-send me-1"></i> اختبار
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Slack -->
                    <div class="col-md-6">
                        <div class="card notification-card p-4" id="slack-card">
                            <div class="text-center">
                                <i class="bi bi-slack notification-icon slack-icon"></i>
                                <h5>Slack</h5>
                            </div>
                            <div class="form-check form-switch mb-3">
                                <input class="form-check-input" type="checkbox" id="slack-enabled" onchange="toggleCard('slack')">
                                <label class="form-check-label" for="slack-enabled">تفعيل</label>
                            </div>
                            <div class="slack-fields" style="display: none;">
                                <div class="mb-3">
                                    <label class="form-label">Webhook URL</label>
                                    <input type="url" class="form-control" id="slack-webhook" placeholder="https://hooks.slack.com/...">
                                </div>
                                <button class="btn btn-outline-primary btn-sm" onclick="testNotification('slack')">
                                    <i class="bi bi-send me-1"></i> اختبار
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Discord -->
                    <div class="col-md-6">
                        <div class="card notification-card p-4" id="discord-card">
                            <div class="text-center">
                                <i class="bi bi-discord notification-icon discord-icon"></i>
                                <h5>Discord</h5>
                            </div>
                            <div class="form-check form-switch mb-3">
                                <input class="form-check-input" type="checkbox" id="discord-enabled" onchange="toggleCard('discord')">
                                <label class="form-check-label" for="discord-enabled">تفعيل</label>
                            </div>
                            <div class="discord-fields" style="display: none;">
                                <div class="mb-3">
                                    <label class="form-label">Webhook URL</label>
                                    <input type="url" class="form-control" id="discord-webhook" placeholder="https://discord.com/api/webhooks/...">
                                </div>
                                <button class="btn btn-outline-primary btn-sm" onclick="testNotification('discord')">
                                    <i class="bi bi-send me-1"></i> اختبار
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Email -->
                    <div class="col-md-6">
                        <div class="card notification-card p-4" id="email-card">
                            <div class="text-center">
                                <i class="bi bi-envelope notification-icon email-icon"></i>
                                <h5>Email</h5>
                            </div>
                            <div class="form-check form-switch mb-3">
                                <input class="form-check-input" type="checkbox" id="email-enabled" onchange="toggleCard('email')">
                                <label class="form-check-label" for="email-enabled">تفعيل</label>
                            </div>
                            <div class="email-fields" style="display: none;">
                                <div class="mb-3">
                                    <label class="form-label">SMTP Server</label>
                                    <input type="text" class="form-control" id="email-smtp" placeholder="smtp.gmail.com">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Port</label>
                                    <input type="number" class="form-control" id="email-port" value="587">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Email</label>
                                    <input type="email" class="form-control" id="email-to" placeholder="alerts@example.com">
                                </div>
                                <button class="btn btn-outline-primary btn-sm" onclick="testNotification('email')">
                                    <i class="bi bi-send me-1"></i> اختبار
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Profiles Tab -->
            <div class="tab-pane fade" id="profiles">
                <div class="card p-4">
                    <h5 class="mb-3">الملفات الشخصية المتاحة</h5>
                    <div class="table-responsive">
                        <table class="table table-dark">
                            <thead>
                                <tr>
                                    <th>الاسم</th>
                                    <th>الوصف</th>
                                    <th>الإجراءات</th>
                                </tr>
                            </thead>
                            <tbody>
                                {% for profile in profiles %}
                                <tr>
                                    <td>{{ profile }}</td>
                                    <td>-</td>
                                    <td>
                                        <button class="btn btn-sm btn-outline-primary">تعديل</button>
                                    </td>
                                </tr>
                                {% endfor %}
                            </tbody>
                        </table>
                    </div>
                    <a href="#" class="btn btn-primary mt-3">
                        <i class="bi bi-plus-lg me-1"></i> إنشاء ملف جديد
                    </a>
                </div>
            </div>
            
            <!-- General Tab -->
            <div class="tab-pane fade" id="general">
                <div class="card p-4">
                    <h5 class="mb-3">إعدادات عامة</h5>
                    <div class="mb-3">
                        <label class="form-label">الملف الشخصي الافتراضي</label>
                        <select class="form-select" id="default-profile">
                            <option value="passive">Passive (سريع وآمن)</option>
                            <option value="full">Full (شامل)</option>
                            <option value="bugbounty">Bug Bounty</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">مستوى السجلات</label>
                        <select class="form-select" id="log-level">
                            <option value="INFO">INFO</option>
                            <option value="DEBUG">DEBUG</option>
                            <option value="WARNING">WARNING</option>
                        </select>
                    </div>
                    <div class="form-check form-switch mb-3">
                        <input class="form-check-input" type="checkbox" id="auto-cleanup" checked>
                        <label class="form-check-label" for="auto-cleanup">تنظيف المهام القديمة تلقائياً</label>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">الاحتفاظ بالمهام (أيام)</label>
                        <input type="number" class="form-control" id="retention-days" value="30">
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Save Button -->
        <div class="mt-4">
            <button class="btn btn-primary btn-lg" onclick="saveSettings()">
                <i class="bi bi-save me-2"></i> حفظ الإعدادات
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function toggleCard(channel) {
            const enabled = document.getElementById(`${channel}-enabled`).checked;
            const fields = document.querySelector(`.${channel}-fields`);
            const card = document.getElementById(`${channel}-card`);
            
            if (enabled) {
                fields.style.display = 'block';
                card.classList.add('enabled');
            } else {
                fields.style.display = 'none';
                card.classList.remove('enabled');
            }
        }
        
        async function testNotification(channel) {
            let data = { channel };
            
            if (channel === 'telegram') {
                data.bot_token = document.getElementById('telegram-token').value;
                data.chat_id = document.getElementById('telegram-chat').value;
            } else if (channel === 'slack') {
                data.webhook_url = document.getElementById('slack-webhook').value;
            } else if (channel === 'discord') {
                data.webhook_url = document.getElementById('discord-webhook').value;
            } else if (channel === 'email') {
                data.smtp_host = document.getElementById('email-smtp').value;
                data.smtp_port = document.getElementById('email-port').value;
                data.to = document.getElementById('email-to').value;
            }
            
            try {
                const resp = await fetch('/api/test-notification', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await resp.json();
                
                if (result.success) {
                    alert('✅ ' + result.message);
                } else {
                    alert('❌ ' + result.message);
                }
            } catch (e) {
                alert('❌ خطأ في الاتصال');
            }
        }
        
        async function saveSettings() {
            const settings = {
                notifications: {
                    telegram: {
                        enabled: document.getElementById('telegram-enabled').checked,
                        bot_token: document.getElementById('telegram-token').value,
                        chat_id: document.getElementById('telegram-chat').value,
                    },
                    slack: {
                        enabled: document.getElementById('slack-enabled').checked,
                        webhook_url: document.getElementById('slack-webhook').value,
                    },
                    discord: {
                        enabled: document.getElementById('discord-enabled').checked,
                        webhook_url: document.getElementById('discord-webhook').value,
                    },
                    email: {
                        enabled: document.getElementById('email-enabled').checked,
                        smtp_host: document.getElementById('email-smtp').value,
                        smtp_port: parseInt(document.getElementById('email-port').value),
                        to: document.getElementById('email-to').value,
                    },
                },
                general: {
                    default_profile: document.getElementById('default-profile').value,
                    log_level: document.getElementById('log-level').value,
                    auto_cleanup: document.getElementById('auto-cleanup').checked,
                    retention_days: parseInt(document.getElementById('retention-days').value),
                }
            };
            
            try {
                const resp = await fetch('/api/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(settings)
                });
                const result = await resp.json();
                
                if (result.success) {
                    alert('✅ تم حفظ الإعدادات بنجاح!');
                } else {
                    alert('❌ فشل حفظ الإعدادات');
                }
            } catch (e) {
                alert('❌ خطأ في الاتصال');
            }
        }
        
        // Load existing settings
        {% if settings %}
        document.addEventListener('DOMContentLoaded', () => {
            const s = {{ settings | tojson | safe }};
            
            if (s.notifications) {
                if (s.notifications.telegram?.enabled) {
                    document.getElementById('telegram-enabled').checked = true;
                    document.getElementById('telegram-token').value = s.notifications.telegram.bot_token || '';
                    document.getElementById('telegram-chat').value = s.notifications.telegram.chat_id || '';
                    toggleCard('telegram');
                }
                if (s.notifications.slack?.enabled) {
                    document.getElementById('slack-enabled').checked = true;
                    document.getElementById('slack-webhook').value = s.notifications.slack.webhook_url || '';
                    toggleCard('slack');
                }
                if (s.notifications.discord?.enabled) {
                    document.getElementById('discord-enabled').checked = true;
                    document.getElementById('discord-webhook').value = s.notifications.discord.webhook_url || '';
                    toggleCard('discord');
                }
                if (s.notifications.email?.enabled) {
                    document.getElementById('email-enabled').checked = true;
                    document.getElementById('email-smtp').value = s.notifications.email.smtp_host || '';
                    document.getElementById('email-port').value = s.notifications.email.smtp_port || 587;
                    document.getElementById('email-to').value = s.notifications.email.to || '';
                    toggleCard('email');
                }
            }
        });
        {% endif %}
    </script>
</body>
</html>
